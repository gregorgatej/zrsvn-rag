<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <title>Map Interface</title>
    
    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <!-- Leaflet Draw CSS & JS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

    <!-- Leaflet Marker Cluster CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css">
    <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
      }
      body {
        display: flex;
        flex-direction: column;
      }
      #map {
        flex: 1;
        width: 100%;
      }
      #output {
        font-family: Arial, sans-serif;
        padding: 10px;
      }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="output"></div>

    <script>
    document.addEventListener("DOMContentLoaded", function() {
        // Initialize map
        var map = L.map('map').setView([46.05, 14.5], 9);
        
        // Add OpenStreetMap tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // Marker clustering
        var markerCluster = L.markerClusterGroup();
        map.addLayer(markerCluster);

        // Force selection of all files on page load/refresh:
        fetch("http://localhost:8000/reset_to_all_files/", {
            method: "POST"
        })
        .then(response => response.json())
        .then(data => {
            console.log("✅ reset_to_all_files:", data.message);
        })
        .catch(error => console.error("❌ Error resetting to all files:", error));

        // Fetch points from API
        fetch("http://localhost:8000/get_all_points/")
            .then(response => response.text())
            .then(text => {
                console.log("📡 Received Data:", text);
                const lines = text.trim().split("\n");
                console.log(`📌 Number of points received: ${lines.length}`);
                lines.forEach(line => {
                    try {
                        let point = JSON.parse(line);
                        if (point.type === "Point") {
                            let coords = point.coordinates;
                            let jitter = (Math.random() - 0.5) * 0.0005; // Avoid exact overlap
                            let marker = L.circleMarker(
                                [coords[1] + jitter, coords[0] + jitter],
                                { radius: 2.5, color: "red", fillColor: "red", fillOpacity: 0.7 }
                            ).bindPopup(`Coordinates: ${coords[1]}, ${coords[0]}`);
                            markerCluster.addLayer(marker);
                        }
                    } catch (error) {
                        console.error("❌ JSON Parse Error:", error, "Data:", line);
                    }
                });
            })
            .catch(error => console.error("❌ Fetch Error:", error));

        // Leaflet Draw Tools
        var drawnItems = new L.FeatureGroup();
        map.addLayer(drawnItems);

        var drawControl = new L.Control.Draw({
            draw: {
                polygon: false,
                polyline: false,
                circle: false,
                marker: false,
                circlemarker: false,
                rectangle: true
            }
        });
        map.addControl(drawControl);

        /* ───────────────────────────────────────────────────────────── */
        /* 1) CREATE A CUSTOM "CLEAR" BUTTON TO RESET DRAWINGS & DOCS   */
        /* ───────────────────────────────────────────────────────────── */
        var ClearControl = L.Control.extend({
            options: { position: 'topleft' },
            onAdd: function(map) {
                var container = L.DomUtil.create('div', 'leaflet-bar leaflet-control leaflet-control-custom');

                container.style.backgroundColor = 'white';
                container.style.width = '30px';
                container.style.height = '30px';
                container.style.cursor = 'pointer';
                container.style.display = 'flex';
                container.style.alignItems = 'center';
                container.style.justifyContent = 'center';
                container.title = "Clear drawn rectangles and reset selected docs";

                container.innerHTML = '🗑'; // Trash bin icon

                L.DomEvent.disableClickPropagation(container);

                container.onclick = function() {
                    // 1. Clear the drawn rectangles
                    drawnItems.clearLayers();

                    // 2. Call reset_to_all_files so we again have everything selected
                    fetch("http://localhost:8000/reset_to_all_files/", { method: "POST" })
                        .then(response => response.json())
                        .then(data => {
                            console.log("✅ Clear button reset:", data.message);
                        })
                        .catch(error => console.error("❌ Error resetting on clear:", error));

                    // We are currently ommiting this since we are opting for all files
                    // being chosen when no rectangles are drawn.
                    // 3. Reset the selected documents on the backend
                    // fetch("http://localhost:8000/reset_selected_filenames/", { method: "POST" })
                    //     .then(response => response.json())
                    //     .then(data => {
                    //         console.log("📌 Selected files reset:", data.message);
                    //     })
                    //     .catch(error => console.error("❌ Error resetting selected files:", error));
                };

                return container;
            }
        });

        // 2) Add the new ClearControl to the map
        map.addControl(new ClearControl());

        /* ───────────────────────────────────────────────────────────── */
        /* Handle Map Events for Drawing                                */
        /* ───────────────────────────────────────────────────────────── */
        map.on('draw:drawstart', function () {
            console.log("✏️ Drawing started - Hiding clusters");
            map.removeLayer(markerCluster);
            drawnItems.clearLayers();
        });

        map.on('draw:drawstop', function () {
            console.log("✅ Drawing stopped - Showing clusters");
            map.addLayer(markerCluster);
        });

        map.on('draw:created', function (e) {
            drawnItems.clearLayers();
            var layer = e.layer;
            drawnItems.addLayer(layer);

            var bounds = layer.getBounds();
            var minLat = bounds.getSouthWest().lat;
            var minLon = bounds.getSouthWest().lng;
            var maxLat = bounds.getNorthEast().lat;
            var maxLon = bounds.getNorthEast().lng;

            fetch(`http://localhost:8000/get_filenames/?min_lat=${minLat}&max_lat=${maxLat}&min_lon=${minLon}&max_lon=${maxLon}`)
                .then(response => response.json())
                .then(data => {
                    console.log("Selected files:", data.selected_filenames);
                })
                .catch(error => console.error("Error:", error));
        });
    });
    </script>
</body>
</html>
